# ==============================================================================
# --- Allgemeine Einstellungen ---
# ==============================================================================

# Mausunterstützung aktivieren (Scrollen, Pane-Auswahl, Resizing)
set -g mouse on

# Standard-Terminal für korrekte Farbdarstellung
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# History-Limit erhöhen
set -g history-limit 50000

# Start-Index für Fenster und Panes auf 1 setzen (ergonomischer auf der Tastatur)
set -g base-index 1
setw -g pane-base-index 1

# Automatische Fensternummerierung beim Schließen aktivieren
set -g renumber-windows on

# Keine Verzögerung beim Drücken der ESC-Taste (wichtig für Vim/Neovim)
set -s escape-time 0

# ==============================================================================
# --- Keybindings (Tastaturkurzbefehle) ---
# ==============================================================================

# Schneller Reload der Konfiguration
bind r source-file ~/.tmux.conf \; display-message "tmux.conf neu geladen!"

# Splitten von Fenstern mit intuitiveren Tasten (und im aktuellen Verzeichnis)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Neues Fenster im aktuellen Verzeichnis öffnen statt im Home-Verzeichnis
bind c new-window -c "#{pane_current_path}"

# Navigation zwischen Panes mit Alt + Pfeiltasten (ohne Prefix-Taste)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vi-Modus für den Copy-Mode aktivieren
setw -g mode-keys vi

# ==============================================================================
# --- Design & Statuszeile ---
# ==============================================================================

# Schlichte, dunkle Statusbar
set -g status-style bg=black,fg=white
set -g status-left-length 30
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=yellow]%d.%m.%Y %H:%M "

# Hervorhebung des aktiven Fensters in der Statusbar
setw -g window-status-current-style fg=black,bg=green,bold
